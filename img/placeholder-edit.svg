<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dotsE" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1FC4C4" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#081A2E"/>
  <rect width="800" height="450" fill="url(#dotsE)"/>

  <!-- Wireframe object: front + back faces of a cube -->
  <g stroke="#1FC4C4" stroke-width="1.4" fill="none" opacity="0.55" transform="translate(400,225)">
    <rect x="-150" y="-90" width="300" height="180" rx="2"/>
    <rect x="-110" y="-130" width="300" height="180" rx="2"/>
    <line x1="-150" y1="-90" x2="-110" y2="-130"/>
    <line x1="150" y1="-90" x2="190" y2="-130"/>
    <line x1="150" y1="90" x2="190" y2="50"/>
    <line x1="-150" y1="90" x2="-110" y2="50"/>
  </g>

  <!-- Highlighted edited region -->
  <g transform="translate(400,225)">
    <rect x="-150" y="-90" width="120" height="180" fill="#1FC4C4" opacity="0.22"/>
    <rect x="-150" y="-90" width="120" height="180" stroke="#1FC4C4" stroke-width="1.8" stroke-dasharray="6 4" fill="none"/>
  </g>

  <!-- Annotation arrow -->
  <g stroke="#1FC4C4" stroke-width="1.6" fill="none" opacity="0.85">
    <path d="M 250 325 L 320 285" stroke-linecap="round"/>
    <path d="M 320 285 l -10 -3 l 4 9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="220" y="320" fill="#1FC4C4" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="2">SCRIPT::CROP</text>

  <!-- Corner labels -->
  <text x="32" y="40" fill="#B8ECEC" opacity="0.65" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="3">[ 01 ] · EDIT · PREVIEW</text>
  <g transform="translate(720,418)">
    <circle cx="0" cy="-3" r="9" fill="none" stroke="#1FC4C4" stroke-width="1.3"/>
    <path d="M -3 -7 L 4 -3 L -3 1 Z" fill="#1FC4C4"/>
    <text x="20" y="0" fill="#B8ECEC" opacity="0.7" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="2">00:08</text>
  </g>
</svg>
