<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="dotsS" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1FC4C4" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#081A2E"/>
  <rect width="800" height="450" fill="url(#dotsS)"/>

  <!-- Layered landscape cross-section: ground, vegetation, structure -->
  <!-- Ground -->
  <path d="M 0 360 Q 200 340 400 350 T 800 345 L 800 450 L 0 450 Z" fill="#0D4A4A"/>
  <path d="M 0 360 Q 200 340 400 350 T 800 345" stroke="#1FC4C4" stroke-width="1.3" stroke-dasharray="5 4" fill="none" opacity="0.7"/>

  <!-- Vegetation patch -->
  <path d="M 70 340 Q 110 285 150 295 Q 195 270 240 295 Q 285 280 320 320 L 320 360 L 70 360 Z" fill="#1F6B6B"/>
  <path d="M 70 340 Q 110 285 150 295 Q 195 270 240 295 Q 285 280 320 320" stroke="#1FC4C4" stroke-width="1.3" stroke-dasharray="5 4" fill="none" opacity="0.7"/>

  <!-- Structure: building -->
  <path d="M 470 360 L 470 220 L 540 200 L 660 200 L 660 360 Z" fill="#1FC4C4" opacity="0.85"/>
  <path d="M 470 360 L 470 220 L 540 200 L 660 200 L 660 360" stroke="#EAFAFA" stroke-width="1.3" stroke-dasharray="5 4" fill="none" opacity="0.55"/>

  <!-- Labels -->
  <text x="100" y="395" fill="#1FC4C4" opacity="0.85" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="2">VEGETATION</text>
  <text x="500" y="395" fill="#EAFAFA" opacity="0.85" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="2">STRUCTURE</text>
  <text x="350" y="430" fill="#B8ECEC" opacity="0.7" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="2">GROUND</text>

  <!-- Corner labels -->
  <text x="32" y="40" fill="#B8ECEC" opacity="0.65" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="3">[ 02 ] · SEGMENT · PREVIEW</text>
  <g transform="translate(720,38)">
    <circle cx="0" cy="-3" r="9" fill="none" stroke="#1FC4C4" stroke-width="1.3"/>
    <path d="M -3 -7 L 4 -3 L -3 1 Z" fill="#1FC4C4"/>
    <text x="20" y="0" fill="#B8ECEC" opacity="0.7" font-family="ui-monospace,Space Grotesk,monospace" font-size="11" letter-spacing="2">00:12</text>
  </g>
</svg>
