<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panoriq · Brand panorama extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #06141f;
      --fg: #eafafa;
      --muted: #7a8b97;
      --accent: #1fc4c4;
      --line: #142a3d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--fg);
      font-family: 'Manrope', system-ui, sans-serif;
      overflow: hidden;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background:
        repeating-conic-gradient(#1a2530 0% 25%, #131e29 0% 50%) 0 0 / 24px 24px;
    }
    canvas {
      display: block;
      max-width: 100%; max-height: 100%;
      box-shadow: 0 30px 90px -20px rgba(0,0,0,0.5);
    }

    .panel {
      position: fixed; top: 24px; right: 24px;
      width: 320px;
      background: rgba(8, 26, 46, 0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(31, 196, 196, 0.2);
      border-radius: 16px;
      padding: 20px;
      z-index: 10;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .panel.hidden { opacity: 0; transform: translateY(-8px); pointer-events: none; }
    .panel h1 {
      font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px;
      letter-spacing: -0.01em; margin: 0 0 4px;
    }
    .panel .sub {
      font-family: 'Space Grotesk', monospace;
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 18px;
    }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 12px;
    }
    .row label {
      font-family: 'Space Grotesk', monospace;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted);
    }
    .row select, .row input[type=number] {
      background: #06141f; color: var(--fg);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 6px 10px; font-family: inherit; font-size: 13px;
      min-width: 120px; outline: none;
    }
    .row select:focus, .row input:focus { border-color: var(--accent); }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    button {
      flex: 1; cursor: pointer;
      background: var(--accent); color: var(--bg);
      border: 0; border-radius: 999px;
      padding: 10px 14px;
      font-family: inherit; font-weight: 600; font-size: 13px;
      transition: background 0.2s ease;
    }
    button:hover { background: var(--fg); }
    button.ghost {
      background: transparent; color: var(--fg);
      border: 1px solid var(--line);
    }
    button.ghost:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
    button.recording { background: #ff5544; color: white; }

    .status {
      font-family: 'Space Grotesk', monospace;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted);
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .status .dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--muted);
      margin-right: 6px; vertical-align: middle;
    }
    .status.live .dot { background: #ff5544; animation: pulse 1s ease-in-out infinite; }
    .status.ready .dot { background: var(--accent); }
    @keyframes pulse { 50% { opacity: 0.3; } }

    .hint {
      font-family: 'Space Grotesk', monospace;
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-top: 10px; line-height: 1.6;
    }
    kbd {
      background: var(--line); color: var(--fg);
      padding: 1px 6px; border-radius: 4px;
      font-family: 'Space Grotesk', monospace; font-size: 10px;
    }
    .switch {
      display: block;
      margin-top: 10px;
      font-family: 'Space Grotesk', monospace;
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
    }
    .switch:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="stage">
    <canvas id="canvas" width="1920" height="1080"></canvas>
  </div>

  <div class="panel" id="panel">
    <h1>Brand panorama extractor</h1>
    <div class="sub">Panoriq · v0.1</div>

    <div class="row">
      <label>Resolution</label>
      <select id="resolution">
        <option value="1280x720">720p (1280×720)</option>
        <option value="1920x1080" selected>1080p (1920×1080)</option>
        <option value="2560x1440">1440p (2560×1440)</option>
        <option value="3840x2160">4K (3840×2160)</option>
        <option value="1080x1080">Square (1080×1080)</option>
        <option value="1080x1920">Vertical (1080×1920)</option>
      </select>
    </div>

    <div class="row">
      <label>Duration</label>
      <input type="number" id="duration" value="10" min="1" max="120" step="1">
    </div>

    <div class="row">
      <label>Background</label>
      <select id="background">
        <option value="navy" selected>Navy gradient</option>
        <option value="solid">Solid navy</option>
        <option value="black">Black</option>
        <option value="transparent">Transparent</option>
      </select>
    </div>

    <div class="row">
      <label>Mark</label>
      <select id="mark">
        <option value="default" selected>Default</option>
        <option value="small">Small</option>
        <option value="large">Large</option>
        <option value="off">Hidden</option>
      </select>
    </div>

    <div class="row">
      <label>Accent dots</label>
      <select id="accentCount">
        <option value="0">None</option>
        <option value="30">Sparse · 30</option>
        <option value="80" selected>Default · 80</option>
        <option value="160">Dense · 160</option>
      </select>
    </div>

    <div class="row">
      <label>Show labels</label>
      <select id="labels">
        <option value="off" selected>Off</option>
        <option value="on">On</option>
      </select>
    </div>

    <div class="actions">
      <button id="record">Record .webm</button>
      <button id="hide" class="ghost" title="Hide UI (H)">Hide UI</button>
    </div>

    <div class="status ready" id="status"><span class="dot"></span><span id="statusText">Ready</span></div>

    <div class="hint">
      <kbd>H</kbd> Toggle UI · <kbd>R</kbd> Record · <kbd>Space</kbd> Pause<br>
      Convert to mp4: <span style="text-transform:none">ffmpeg -i in.webm -c:v libx264 -pix_fmt yuv420p out.mp4</span>
    </div>

    <a class="switch" href="point-cloud.html">↗ Switch to point cloud</a>
  </div>

  <script>
    // ─── State ──────────────────────────────────────────────────────────
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const panel = document.getElementById("panel");
    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("statusText");

    const cfg = {
      width: 1920,
      height: 1080,
      duration: 10,
      background: "navy",     // navy | solid | black | transparent
      mark: "default",        // off | small | default | large
      accentCount: 80,
      showLabels: false,
    };

    // ─── Helpers ────────────────────────────────────────────────────────
    let accentDots = [];
    function regenerateAccentDots() {
      accentDots = [];
      const cx = cfg.width / 2;
      const cy = cfg.height / 2;
      const minR = Math.min(cfg.width, cfg.height) * markRadius() * 1.6;
      const maxR = Math.min(cfg.width, cfg.height) * 0.55;
      for (let i = 0; i < cfg.accentCount; i++) {
        // Place around the mark, biased to a ring
        const angle = Math.random() * Math.PI * 2;
        const dist = minR + Math.random() * (maxR - minR);
        accentDots.push({
          x: cx + Math.cos(angle) * dist,
          y: cy + Math.sin(angle) * dist,
          r: 1.2 + Math.random() * 2.6,
          phase: Math.random() * Math.PI * 2,
          speed: 0.35 + Math.random() * 0.5,
          driftAmp: 6 + Math.random() * 14,
        });
      }
    }

    function markRadius() {
      const base = 0.21;
      if (cfg.mark === "small") return 0.14;
      if (cfg.mark === "large") return 0.30;
      return base;
    }

    function applyResolution() {
      canvas.width = cfg.width;
      canvas.height = cfg.height;
      regenerateAccentDots();
    }
    applyResolution();

    // ─── Drawing ────────────────────────────────────────────────────────
    function drawBackground() {
      const w = cfg.width, h = cfg.height;
      if (cfg.background === "transparent") {
        ctx.clearRect(0, 0, w, h);
        return;
      }
      if (cfg.background === "black") {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, w, h);
        return;
      }
      if (cfg.background === "solid") {
        ctx.fillStyle = "#0E2A47";
        ctx.fillRect(0, 0, w, h);
      } else {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, "#06121e");
        grad.addColorStop(1, "#0E2A47");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }

      // Dot grid
      const gridSize = Math.max(28, Math.floor(w / 50));
      ctx.fillStyle = "rgba(31,196,196,0.06)";
      for (let y = 0; y < h; y += gridSize) {
        for (let x = 0; x < w; x += gridSize) {
          ctx.beginPath();
          ctx.arc(x, y, Math.max(1, w / 1300), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Glow 1 (cyan, top-left)
      const g1 = ctx.createRadialGradient(w * 0.18, h * 0.45, 0, w * 0.18, h * 0.45, w * 0.42);
      g1.addColorStop(0, "rgba(31,196,196,0.16)");
      g1.addColorStop(1, "rgba(31,196,196,0)");
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, w, h);

      // Glow 2 (aqua, bottom-right)
      const g2 = ctx.createRadialGradient(w * 0.84, h * 0.6, 0, w * 0.84, h * 0.6, w * 0.42);
      g2.addColorStop(0, "rgba(184,236,236,0.10)");
      g2.addColorStop(1, "rgba(184,236,236,0)");
      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, w, h);
    }

    function drawWaveInsideMark(cx, cy, r, yRel, dx, color) {
      // yRel is -1..1 relative to mark center; below center fills the bottom half.
      const yBase = cy + yRel * r;
      const left = cx - r * 1.3 + dx;
      const right = cx + r * 1.3 + dx;
      const mid = cx + dx;

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(left, yBase);
      ctx.quadraticCurveTo(cx - r * 0.4 + dx, yBase - r * 0.08, mid, yBase + r * 0.04);
      ctx.quadraticCurveTo(cx + r * 0.6 + dx, yBase + r * 0.12, right, yBase - r * 0.005);
      ctx.lineTo(right, cy + r);
      ctx.lineTo(left, cy + r);
      ctx.closePath();
      ctx.fill();
    }

    function drawMark(t) {
      if (cfg.mark === "off") return;
      const w = cfg.width, h = cfg.height;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(w, h) * markRadius();
      const ringR = r * 1.04;

      // Clip to inner circle
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();

      // Inside fill (ensures clean canvas inside the circle)
      ctx.fillStyle = "#0E2A47";
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      // Wave layers (drift sinusoidally — seamless loop friendly)
      const drift = (i) => Math.sin(t * (0.30 + i * 0.06) + i * 0.7) * (r * 0.05 + i * r * 0.012);
      drawWaveInsideMark(cx, cy, r, -0.13, drift(0), "#0D4A4A");
      drawWaveInsideMark(cx, cy, r,  0.07, drift(1), "#1F6B6B");
      drawWaveInsideMark(cx, cy, r,  0.22, drift(2), "#0FA5A5");
      drawWaveInsideMark(cx, cy, r,  0.36, drift(3), "#1FC4C4");

      ctx.restore();

      // Outer ring
      ctx.strokeStyle = "#1FC4C4";
      ctx.lineWidth = Math.max(2, w / 700);
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function drawAccentDots(t) {
      for (const d of accentDots) {
        const dx = Math.sin(t * d.speed + d.phase) * d.driftAmp;
        const dy = Math.cos(t * d.speed * 0.85 + d.phase) * d.driftAmp * 0.7;
        const twinkle = 0.45 + 0.45 * Math.sin(t * (0.6 + d.speed * 0.4) + d.phase * 2);
        ctx.fillStyle = `rgba(31,196,196,${twinkle.toFixed(3)})`;
        ctx.beginPath();
        ctx.arc(d.x + dx, d.y + dy, d.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawLabels() {
      if (!cfg.showLabels) return;
      const w = cfg.width, h = cfg.height;
      const fontSm = Math.max(11, Math.floor(w / 100));
      const fontXs = Math.max(10, Math.floor(w / 130));

      // Top-left
      ctx.fillStyle = "rgba(184,236,236,0.7)";
      ctx.font = `500 ${fontSm}px 'Space Grotesk', monospace`;
      ctx.textBaseline = "top";
      ctx.fillText("PANORIQ · DEMO", w * 0.04, h * 0.06);

      ctx.strokeStyle = "rgba(31,196,196,0.55)";
      ctx.lineWidth = Math.max(1, w / 1100);
      ctx.beginPath();
      ctx.moveTo(w * 0.04, h * 0.06 + fontSm * 1.4);
      ctx.lineTo(w * 0.04 + fontSm * 9, h * 0.06 + fontSm * 1.4);
      ctx.stroke();

      // Bottom-right pill
      const pillW = w * 0.07, pillH = h * 0.04;
      const px = w - w * 0.04 - pillW;
      const py = h - h * 0.06 - pillH;
      ctx.fillStyle = "#06121e";
      ctx.strokeStyle = "rgba(31,196,196,0.4)";
      ctx.lineWidth = Math.max(1, w / 1100);
      roundedRect(px, py, pillW, pillH, pillH / 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "rgba(184,236,236,0.85)";
      ctx.font = `500 ${fontXs}px 'Space Grotesk', monospace`;
      ctx.textBaseline = "middle";
      ctx.fillText("01:30", px + pillW * 0.20, py + pillH / 2);
      ctx.fillStyle = "#1FC4C4";
      ctx.beginPath();
      ctx.arc(px + pillW * 0.78, py + pillH / 2, pillH * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    // ─── Animation loop ─────────────────────────────────────────────────
    let paused = false;
    let startedAt = performance.now();
    function tick(now) {
      const t = paused ? 0 : (now - startedAt) / 1000;
      drawBackground();
      drawMark(t);
      drawAccentDots(t);
      drawLabels();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // ─── UI bindings ────────────────────────────────────────────────────
    document.getElementById("resolution").addEventListener("change", e => {
      const [w, h] = e.target.value.split("x").map(Number);
      cfg.width = w; cfg.height = h;
      applyResolution();
    });
    document.getElementById("duration").addEventListener("change", e => {
      cfg.duration = Math.max(1, Math.min(120, Number(e.target.value) || 10));
    });
    document.getElementById("background").addEventListener("change", e => {
      cfg.background = e.target.value;
    });
    document.getElementById("mark").addEventListener("change", e => {
      cfg.mark = e.target.value;
      regenerateAccentDots();
    });
    document.getElementById("accentCount").addEventListener("change", e => {
      cfg.accentCount = Number(e.target.value);
      regenerateAccentDots();
    });
    document.getElementById("labels").addEventListener("change", e => {
      cfg.showLabels = e.target.value === "on";
    });

    // ─── Hide UI / shortcuts ────────────────────────────────────────────
    document.getElementById("hide").addEventListener("click", () => panel.classList.toggle("hidden"));
    window.addEventListener("keydown", e => {
      if (e.key === "h" || e.key === "H") panel.classList.toggle("hidden");
      else if (e.key === "r" || e.key === "R") record();
      else if (e.key === " ") { paused = !paused; e.preventDefault(); }
    });

    // ─── Recording ──────────────────────────────────────────────────────
    const recordBtn = document.getElementById("record");
    function setStatus(text, cls) {
      statusText.textContent = text;
      statusEl.className = "status " + (cls || "");
    }

    function pickMimeType(transparent) {
      const candidates = transparent
        ? ["video/webm;codecs=vp9", "video/webm;codecs=vp8"]
        : ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"];
      for (const m of candidates) {
        if (MediaRecorder.isTypeSupported(m)) return m;
      }
      return "";
    }

    async function record() {
      if (recordBtn.dataset.busy === "1") return;
      recordBtn.dataset.busy = "1";
      recordBtn.classList.add("recording");
      const transparent = cfg.background === "transparent";
      const mimeType = pickMimeType(transparent);
      if (!mimeType) {
        setStatus("MediaRecorder not supported", "");
        recordBtn.dataset.busy = ""; recordBtn.classList.remove("recording");
        return;
      }

      const stream = canvas.captureStream(60);
      const recorder = new MediaRecorder(stream, {
        mimeType,
        videoBitsPerSecond: 24_000_000,
      });
      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        a.href = url;
        a.download = `panoriq-panorama-${cfg.width}x${cfg.height}-${cfg.duration}s-${stamp}.webm`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);

        const mb = (blob.size / 1024 / 1024).toFixed(1);
        setStatus(`Done · ${mb} MB`, "ready");
        recordBtn.textContent = "Record .webm";
        recordBtn.classList.remove("recording");
        recordBtn.dataset.busy = "";
      };

      recorder.start();
      const start = performance.now();
      setStatus(`Recording 0 / ${cfg.duration}s`, "live");

      const tickStatus = () => {
        const elapsed = (performance.now() - start) / 1000;
        if (elapsed >= cfg.duration) { recorder.stop(); return; }
        setStatus(`Recording ${elapsed.toFixed(1)} / ${cfg.duration}s`, "live");
        requestAnimationFrame(tickStatus);
      };
      requestAnimationFrame(tickStatus);
    }
    recordBtn.addEventListener("click", record);
  </script>

</body>
</html>
