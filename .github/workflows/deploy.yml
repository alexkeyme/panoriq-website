name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skip in-progress runs queued between
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        # The site is fully static — no build step needed.
        # Stage only what should be public; skip dev-only files.
        run: |
          mkdir -p _site
          cp -r index.html 404.html impressum.html datenschutz.html _site/
          cp -r CI img js _site/
          [ -d extract ] && cp -r extract _site/extract || true
          cp favicon.ico icon.png icon.svg robots.txt site.webmanifest _site/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
