name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skip in-progress runs queued between
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Stage site
        # All assets are self-hosted: fonts, three.js, built CSS.
        # No external CDN requests on page load.
        run: |
          mkdir -p _site
          cp index.html 404.html impressum.html datenschutz.html agent-evaluation.html _site/
          cp agent-evaluation-scorecard.pdf _site/
          cp -r CI img js fonts dist _site/
          [ -d extract ] && cp -r extract _site/extract || true
          cp favicon.ico icon.png icon.svg robots.txt site.webmanifest _site/ 2>/dev/null || true

      - name: Version asset URLs
        run: |
          ASSET_VERSION="${GITHUB_SHA::8}"
          for file in _site/*.html; do
            sed -i "s/__ASSET_VERSION__/${ASSET_VERSION}/g" "$file"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
